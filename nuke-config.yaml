blocklist:
  - "PRODUCTION_ACCOUNT_ID" # account(s) to protect from being nuked

bypass-alias-check-accounts:
  - "ACCOUNT_ID" # account(s) allowed to skip alias verification

regions:
  - eu-west-1

resource-types:
  excludes:
    - IAMUser

presets:
  tagged-protection:
    filters:
      __global__:
        - property: tag:SCP-PLATFOM-ALLOW
          type: regex
          value: ".+"
        - property: tag:core-protection
          type: regex
          value: ".+"

accounts:
  "ACCOUNT_ID":
    presets:
      - tagged-protection
